<body class="bg-light">

<div class="container my-5">
    <h2 class="text-center text-danger">📍 Visit Us • Call Us • WhatsApp Us</h2>
    <div class="row">
        <div class="col-md-6">
            <form class="p-4 shadow bg-white">
                <input type="text" class="form-control mb-3" placeholder="Your Name" required>
                <input type="email" class="form-control mb-3" placeholder="Email" required>
                <textarea class="form-control mb-3" rows="4" placeholder="Message or booking request"></textarea>
                <button onclick="sendMsg()" class="btn btn-red w-100">SEND MESSAGE 🔥</button>
            </form>
        </div>
        <div class="col-md-6">
            <div class="bg-white p-4 shadow h-100">
                <h5>📍 Hyderabad Showroom</h5>
                <p>Banjara Hills • Road No. 12<br>📞 +91 98765 43210<br>🕒 9 AM – 9 PM (Open Today)</p>
                <button onclick="alert('✅ Call started! 📞')" class="btn btn-success">Call Now</button>
                <button onclick="alert('📱 WhatsApp opened 🔥')" class="btn btn-success ms-2">WhatsApp</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function sendMsg() {
        alert("✅ Message received! Our team will reply in 2 mins 🔥");
    }
</script>
